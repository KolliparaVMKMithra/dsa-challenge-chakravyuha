services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - POWER_AUTOMATE_SIGNUP_WEBHOOK_URL=${POWER_AUTOMATE_SIGNUP_WEBHOOK_URL:-}
      - DATABASE_URL=${DATABASE_URL:-}
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    restart: always
